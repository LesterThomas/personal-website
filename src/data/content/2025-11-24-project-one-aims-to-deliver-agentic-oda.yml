title: "Project ONE aims to deliver agentic ODA"
type: article
date: 2025-11-24
url: "https://inform.tmforum.org/features-and-opinion/project-one-aims-to-deliver-agentic-oda"
description: "TM Forum members are launching a new Innovation Hub pioneer project called Project ONE to make the Open Digital Architecture (ODA) AI-native. This requires building AI and data foundations and extensions to the ODA Canvas so that AI agents can communicate with ODA components and each other."
publication: "TM Forum Inform"