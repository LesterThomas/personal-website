description: "What can we do with an abundance of (somewhat limited) intelligence? A recent paper ( https://lnkd.in/eG2T69yK ) highlighted a key limitation of current LLMs: they cannot perform genuine logical reasoning; they only replicate reasoning steps from their training data. I agree with this conclusion but would add two points: 1. Being able to replicate reasoning from training data is a pretty good star"
